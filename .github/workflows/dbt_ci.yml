name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DBT_SQLITE_MAIN_DB: ${{ github.workspace }}/data/warehouse.db
      DBT_SQLITE_SCHEMA_DIR: ${{ github.workspace }}/data

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt dependencies
        run: pip install -r requirements.txt

      - name: Validate dbt connection
        run: dbt debug --profiles-dir .

      - name: Seed, build and test models
        run: |
          dbt seed --full-refresh --profiles-dir .
          dbt build --profiles-dir .

      - name: Generate dbt documentation artifacts
        run: dbt docs generate --profiles-dir .

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: target/
          if-no-files-found: error
