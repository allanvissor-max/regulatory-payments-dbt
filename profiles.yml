# This profile contains no credentials and is safe to keep in Git.
# Set the two environment variables before running dbt; see README.md.
regulatory_payments_dbt:
  target: dev
  outputs:
    dev:
      type: sqlite
      threads: 1
      database: regulatory_payments
      schema: main
      schemas_and_paths:
        main: "{{ env_var('DBT_SQLITE_MAIN_DB') }}"
      schema_directory: "{{ env_var('DBT_SQLITE_SCHEMA_DIR') }}"
